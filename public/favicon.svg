<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff4d3d"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
    <linearGradient id="zapGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffe0dd" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="32" height="32" rx="8" ry="8" fill="url(#bgGrad)"/>

  <!-- Subtle inner glow overlay -->
  <rect width="32" height="32" rx="8" ry="8"
    fill="none"
    stroke="rgba(255,255,255,0.15)"
    stroke-width="1"/>

  <!-- Zap / lightning bolt icon (centered) -->
  <path
    d="M18.5 4 L10 17 L15.5 17 L13.5 28 L23 15 L17 15 Z"
    fill="url(#zapGrad)"
    stroke="rgba(255,255,255,0.1)"
    stroke-width="0.3"
    stroke-linejoin="round"
  />
</svg>